stages:
  - quality
  - build

quality:
  image: python:3.12
  stage: quality
  rules:
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  script:
    - pip install --upgrade pip
    - pip install poetry
    - poetry install
    - poetry run ruff format --check .
    - poetry run ruff check .
    - poetry run mypy
    - poetry run pytest

build_wheels:
  image: python:${PYTHON_VERSION}
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG'
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  script:
    - pip install --upgrade pip
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

